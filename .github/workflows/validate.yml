name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate skill, manifests, and installer
        run: npm run validate

      - name: Build installable skill archive
        run: npm run package:skill

      - name: Verify skill archive
        run: python -m zipfile -t dist/how-to-read.skill
